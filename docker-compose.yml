version: '3.8'

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symfony_php
    working_dir: /var/www/html/guestbook
    volumes:
      - .:/var/www/html
    tty: true

  nginx:
    image: nginx:alpine
    container_name: symfony_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  node:
    image: node:20-alpine
    container_name: symfony_node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    tty: true